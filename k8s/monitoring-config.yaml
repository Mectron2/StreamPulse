apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: stream-pulse
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 5s
    scrape_configs:
      - job_name: aggregator
        metrics_path: /metrics
        static_configs:
          - targets: [aggregator:3001]
            labels:
              service: aggregator
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: stream-pulse
data:
  prometheus.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: false
